<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="400" viewBox="0 0 1280 400">
  <defs>
    <!-- Fonts -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&amp;family=Orbitron:wght@900&amp;family=Rajdhani:wght@300;500&amp;display=swap');
    </style>

    <!-- Grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(0,255,180,0.06)" stroke-width="0.8"/>
    </pattern>

    <!-- Glow filters -->
    <filter id="glow-green" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-text" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-soft">
      <feGaussianBlur stdDeviation="60" result="blur"/>
    </filter>

    <!-- Scanlines -->
    <pattern id="scanlines" width="1" height="4" patternUnits="userSpaceOnUse">
      <rect width="1" height="2" fill="transparent"/>
      <rect y="2" width="1" height="2" fill="rgba(0,0,0,0.18)"/>
    </pattern>

    <!-- Gradients -->
    <linearGradient id="vline-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(0,255,170,0)" />
      <stop offset="50%" stop-color="rgba(0,255,170,0.22)" />
      <stop offset="100%" stop-color="rgba(0,255,170,0)" />
    </linearGradient>
    <linearGradient id="bar-cpu" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00ffaa"/>
      <stop offset="100%" stop-color="#00e5ff"/>
    </linearGradient>
    <linearGradient id="bar-mem" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00c8ff"/>
      <stop offset="100%" stop-color="#0080ff"/>
    </linearGradient>
    <linearGradient id="bar-disk" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#44ffbb"/>
      <stop offset="100%" stop-color="#00e5a0"/>
    </linearGradient>
    <radialGradient id="glow-left-grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(0,255,170,0.14)"/>
      <stop offset="65%" stop-color="rgba(0,255,170,0)"/>
    </radialGradient>
    <radialGradient id="glow-right-grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(0,160,255,0.12)"/>
      <stop offset="65%" stop-color="rgba(0,160,255,0)"/>
    </radialGradient>

    <!-- Clip for ticker -->
    <clipPath id="ticker-clip">
      <rect x="0" y="374" width="1280" height="26"/>
    </clipPath>
  </defs>

  <!-- ── BACKGROUND ── -->
  <rect width="1280" height="400" fill="#020b0f"/>

  <!-- Grid -->
  <rect width="1280" height="400" fill="url(#grid)"/>

  <!-- Ambient glows -->
  <ellipse cx="-50" cy="200" rx="300" ry="300" fill="url(#glow-left-grad)"/>
  <ellipse cx="1330" cy="140" rx="260" ry="260" fill="url(#glow-right-grad)"/>

  <!-- Scanlines -->
  <rect width="1280" height="400" fill="url(#scanlines)" opacity="0.9"/>

  <!-- ── TOP STATUS BAR ── -->
  <rect width="1280" height="28" fill="rgba(0,255,170,0.04)"/>
  <line x1="0" y1="28" x2="1280" y2="28" stroke="rgba(0,255,170,0.1)" stroke-width="1"/>

  <!-- Top bar dots + text -->
  <circle cx="20" cy="14" r="3" fill="#00ff88"/>
  <text x="30" y="18" font-family="'Share Tech Mono', monospace" font-size="8" fill="rgba(0,255,170,0.4)" letter-spacing="2">SYSTEM ONLINE</text>

  <circle cx="170" cy="14" r="3" fill="#00c8ff"/>
  <text x="180" y="18" font-family="'Share Tech Mono', monospace" font-size="8" fill="rgba(0,255,170,0.4)" letter-spacing="2">MONITORING ACTIVE</text>

  <circle cx="360" cy="14" r="3" fill="#00ff88"/>
  <text x="370" y="18" font-family="'Share Tech Mono', monospace" font-size="8" fill="rgba(0,255,170,0.4)" letter-spacing="2">UBUNTU SERVER</text>

  <text x="950" y="18" font-family="'Share Tech Mono', monospace" font-size="8" fill="rgba(0,255,170,0.3)" letter-spacing="2">VIRTUALBOX • LAB ENV • 8 SCENARIOS</text>

  <!-- ── CORNER ACCENTS ── -->
  <!-- TL -->
  <polyline points="16,40 16,16 40,16" fill="none" stroke="rgba(0,255,170,0.38)" stroke-width="2"/>
  <!-- TR -->
  <polyline points="1240,16 1264,16 1264,40" fill="none" stroke="rgba(0,255,170,0.38)" stroke-width="2"/>
  <!-- BL -->
  <polyline points="16,360 16,384 40,384" fill="none" stroke="rgba(0,255,170,0.38)" stroke-width="2"/>
  <!-- BR -->
  <polyline points="1240,384 1264,384 1264,360" fill="none" stroke="rgba(0,255,170,0.38)" stroke-width="2"/>

  <!-- ── VERTICAL DIVIDERS ── -->
  <rect x="400" y="60" width="1" height="280" fill="url(#vline-grad)"/>
  <rect x="965" y="60" width="1" height="280" fill="url(#vline-grad)"/>

  <!-- ── LEFT TERMINAL PANEL ── -->
  <rect x="48" y="72" width="300" height="256" rx="6" fill="rgba(0,20,15,0.8)" stroke="rgba(0,255,170,0.25)" stroke-width="1"/>

  <!-- Terminal header -->
  <circle cx="67" cy="93" r="4" fill="#ff5f57"/>
  <circle cx="82" cy="93" r="4" fill="#febc2e"/>
  <circle cx="97" cy="93" r="4" fill="#28c840"/>
  <text x="110" y="97" font-family="'Share Tech Mono', monospace" font-size="8.5" fill="rgba(0,255,170,0.5)" letter-spacing="1">NOC@UBUNTU-LAB:~</text>
  <line x1="58" y1="106" x2="338" y2="106" stroke="rgba(0,255,170,0.12)" stroke-width="1"/>

  <!-- Terminal lines -->
  <text x="58" y="124" font-family="'Share Tech Mono', monospace" font-size="9.5" fill="rgba(0,200,130,0.65)">$ </text>
  <text x="74" y="124" font-family="'Share Tech Mono', monospace" font-size="9.5" fill="#00ffaa">systemctl status nginx</text>

  <text x="66" y="142" font-family="'Share Tech Mono', monospace" font-size="9" fill="rgba(180,255,230,0.55)">● nginx.service - active (running)</text>

  <text x="58" y="160" font-family="'Share Tech Mono', monospace" font-size="9.5" fill="rgba(0,200,130,0.65)">$ </text>
  <text x="74" y="160" font-family="'Share Tech Mono', monospace" font-size="9.5" fill="#00ffaa">top -bn1 | head -5</text>

  <text x="66" y="178" font-family="'Share Tech Mono', monospace" font-size="9" fill="#ffcc44">⚠ CPU: 73.2% [stress]</text>

  <text x="58" y="196" font-family="'Share Tech Mono', monospace" font-size="9.5" fill="rgba(0,200,130,0.65)">$ </text>
  <text x="74" y="196" font-family="'Share Tech Mono', monospace" font-size="9.5" fill="#00ffaa">df -h /</text>

  <text x="66" y="214" font-family="'Share Tech Mono', monospace" font-size="9" fill="#00ff88">✓ /dev/sda1: 41% used</text>

  <text x="58" y="232" font-family="'Share Tech Mono', monospace" font-size="9.5" fill="rgba(0,200,130,0.65)">$ </text>
  <text x="74" y="232" font-family="'Share Tech Mono', monospace" font-size="9.5" fill="#00ffaa">ss -tlnp | grep :80</text>

  <text x="66" y="250" font-family="'Share Tech Mono', monospace" font-size="9" fill="rgba(180,255,230,0.55)">LISTEN 0.0.0.0:80 nginx</text>

  <text x="58" y="268" font-family="'Share Tech Mono', monospace" font-size="9.5" fill="rgba(0,200,130,0.65)">$ </text>
  <text x="74" y="268" font-family="'Share Tech Mono', monospace" font-size="9.5" fill="#00ffaa">journalctl -u nginx -n 3</text>

  <text x="66" y="286" font-family="'Share Tech Mono', monospace" font-size="9" fill="#00ff88">✓ Service recovered</text>
  <!-- Cursor block -->
  <rect x="182" y="276" width="6" height="11" fill="#00ffaa"/>

  <!-- ── CENTER CONTENT ── -->
  <!-- Badge -->
  <rect x="505" y="100" width="270" height="20" rx="2" fill="rgba(0,255,170,0.05)" stroke="rgba(0,255,170,0.35)" stroke-width="1"/>
  <text x="640" y="114" font-family="'Share Tech Mono', monospace" font-size="9" fill="#00ffaa" letter-spacing="3" text-anchor="middle">■ HOME LAB PROJECT ■</text>

  <!-- Main title INFRA NOC -->

  <!-- INFRA white, NOC teal - two separate words -->
  <text x="640" y="182" font-family="'Orbitron', 'Share Tech Mono', monospace" font-weight="900" font-size="62" fill="white" text-anchor="end" letter-spacing="-1">INFRA</text>
  <text x="655" y="182" font-family="'Orbitron', 'Share Tech Mono', monospace" font-weight="900" font-size="62" fill="#00ffaa" text-anchor="start" letter-spacing="-1">NOC</text>

  <!-- Subtitle -->
  <text x="640" y="212" font-family="'Rajdhani', 'Share Tech Mono', monospace" font-weight="300" font-size="15" fill="rgba(0,200,255,0.75)" text-anchor="middle" letter-spacing="5">Home Lab  ·  Incident Operations</text>

  <!-- Tags row -->
  <!-- Linux -->
  <rect x="418" y="232" width="52" height="18" rx="2" fill="rgba(0,255,170,0.06)" stroke="rgba(0,255,170,0.18)" stroke-width="1"/>
  <text x="444" y="244" font-family="'Share Tech Mono', monospace" font-size="8.5" fill="rgba(0,255,170,0.65)" text-anchor="middle" letter-spacing="1">Linux</text>

  <!-- Monitoring -->
  <rect x="477" y="232" width="76" height="18" rx="2" fill="rgba(0,255,170,0.06)" stroke="rgba(0,255,170,0.18)" stroke-width="1"/>
  <text x="515" y="244" font-family="'Share Tech Mono', monospace" font-size="8.5" fill="rgba(0,255,170,0.65)" text-anchor="middle" letter-spacing="1">Monitoring</text>

  <!-- Incident Response -->
  <rect x="560" y="232" width="118" height="18" rx="2" fill="rgba(0,255,170,0.06)" stroke="rgba(0,255,170,0.18)" stroke-width="1"/>
  <text x="619" y="244" font-family="'Share Tech Mono', monospace" font-size="8.5" fill="rgba(0,255,170,0.65)" text-anchor="middle" letter-spacing="1">Incident Response</text>

  <!-- Nginx -->
  <rect x="685" y="232" width="48" height="18" rx="2" fill="rgba(0,255,170,0.06)" stroke="rgba(0,255,170,0.18)" stroke-width="1"/>
  <text x="709" y="244" font-family="'Share Tech Mono', monospace" font-size="8.5" fill="rgba(0,255,170,0.65)" text-anchor="middle" letter-spacing="1">Nginx</text>

  <!-- Network Diag -->
  <rect x="740" y="232" width="92" height="18" rx="2" fill="rgba(0,255,170,0.06)" stroke="rgba(0,255,170,0.18)" stroke-width="1"/>
  <text x="786" y="244" font-family="'Share Tech Mono', monospace" font-size="8.5" fill="rgba(0,255,170,0.65)" text-anchor="middle" letter-spacing="1">Network Diag</text>

  <!-- VirtualBox -->
  <rect x="839" y="232" width="76" height="18" rx="2" fill="rgba(0,255,170,0.06)" stroke="rgba(0,255,170,0.18)" stroke-width="1"/>
  <text x="877" y="244" font-family="'Share Tech Mono', monospace" font-size="8.5" fill="rgba(0,255,170,0.65)" text-anchor="middle" letter-spacing="1">VirtualBox</text>

  <!-- ── RIGHT METRICS PANEL ── -->
  <!-- CPU Card -->
  <rect x="988" y="75" width="244" height="58" rx="4" fill="rgba(0,15,20,0.75)" stroke="rgba(0,200,255,0.2)" stroke-width="1"/>
  <text x="1000" y="90" font-family="'Share Tech Mono', monospace" font-size="8" fill="rgba(0,200,255,0.55)" letter-spacing="2">CPU LOAD</text>
  <rect x="1000" y="95" width="220" height="4" rx="2" fill="rgba(255,255,255,0.07)"/>
  <rect x="1000" y="95" width="161" height="4" rx="2" fill="url(#bar-cpu)"/>
  <text x="1220" y="120" font-family="'Share Tech Mono', monospace" font-size="9" fill="rgba(0,230,255,0.72)" text-anchor="end">73.2%</text>

  <!-- Memory Card -->
  <rect x="988" y="141" width="244" height="58" rx="4" fill="rgba(0,15,20,0.75)" stroke="rgba(0,200,255,0.2)" stroke-width="1"/>
  <text x="1000" y="156" font-family="'Share Tech Mono', monospace" font-size="8" fill="rgba(0,200,255,0.55)" letter-spacing="2">MEMORY</text>
  <rect x="1000" y="161" width="220" height="4" rx="2" fill="rgba(255,255,255,0.07)"/>
  <rect x="1000" y="161" width="128" height="4" rx="2" fill="url(#bar-mem)"/>
  <text x="1220" y="186" font-family="'Share Tech Mono', monospace" font-size="9" fill="rgba(0,230,255,0.72)" text-anchor="end">58.4%</text>

  <!-- Disk Card -->
  <rect x="988" y="207" width="244" height="58" rx="4" fill="rgba(0,15,20,0.75)" stroke="rgba(0,200,255,0.2)" stroke-width="1"/>
  <text x="1000" y="222" font-family="'Share Tech Mono', monospace" font-size="8" fill="rgba(0,200,255,0.55)" letter-spacing="2">DISK USAGE</text>
  <rect x="1000" y="227" width="220" height="4" rx="2" fill="rgba(255,255,255,0.07)"/>
  <rect x="1000" y="227" width="90" height="4" rx="2" fill="url(#bar-disk)"/>
  <text x="1220" y="252" font-family="'Share Tech Mono', monospace" font-size="9" fill="rgba(0,230,255,0.72)" text-anchor="end">41.0%</text>

  <!-- Status Card -->
  <rect x="988" y="273" width="244" height="55" rx="4" fill="rgba(0,15,20,0.75)" stroke="rgba(0,200,255,0.2)" stroke-width="1"/>
  <!-- Nginx running -->
  <circle cx="1002" cy="287" r="4" fill="#00ff88"/>
  <text x="1012" y="291" font-family="'Share Tech Mono', monospace" font-size="8" fill="rgba(0,200,255,0.55)" letter-spacing="1">Nginx — Running</text>
  <!-- CPU Spike -->
  <circle cx="1002" cy="305" r="4" fill="#ffcc44"/>
  <text x="1012" y="309" font-family="'Share Tech Mono', monospace" font-size="8" fill="rgba(0,200,255,0.55)" letter-spacing="1">CPU Spike — Detected</text>
  <!-- Network OK -->
  <circle cx="1002" cy="323" r="4" fill="#00ff88"/>
  <text x="1012" y="327" font-family="'Share Tech Mono', monospace" font-size="8" fill="rgba(0,200,255,0.55)" letter-spacing="1">Network — OK</text>

  <!-- ── BOTTOM TICKER BAR ── -->
  <rect x="0" y="374" width="1280" height="26" fill="rgba(0,15,10,0.85)"/>
  <line x1="0" y1="374" x2="1280" y2="374" stroke="rgba(0,255,170,0.12)" stroke-width="1"/>
  <text x="20" y="391" font-family="'Share Tech Mono', monospace" font-size="8.5" fill="rgba(0,255,170,0.42)" letter-spacing="2">
    ▸ DAY 1: SYSTEM HEALTH BASELINE   ▸ DAY 2: NGINX SERVICE INCIDENT   ▸ DAY 3: CPU SPIKE SIMULATION   ▸ DAY 4: DISK SPACE EXHAUSTION   ▸ DAY 5: MEMORY PRESSURE SIMULATION   ▸ DAY 6: NETWORK TROUBLESHOOTING   ▸ DAY 7: NGINX SERVICE FAILURE   ▸ DAY 8: PORT CONFLICT SIMULATION
  </text>

</svg>